<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP Football Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        #video-container {
            position: relative;
            flex-grow: 1;
        }
        #logo {
            max-width: 200px;
            margin-top: 20px;
        }
        #title {
            font-size: 36px;
            font-weight: bold;
            margin-top: 20px;
        }
        #playButton {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 32px;
            font-size: 20px;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 5px;
        }
        #playButton:hover {
            background-color: #45a049;
        }
        /* Scrolling Banner */
        #banner {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            z-index: 2;
            white-space: nowrap;
            overflow: hidden;
            width: 100%;
        }

        #banner p {
            margin: 0;
            padding: 0;
            display: inline-block;
            animation: scroll-banner 15s linear infinite;
        }

        @keyframes scroll-banner {
            0% {
                transform: translateX(100%);
            }
            100% {
                transform: translateX(-100%);
            }
        }

        /* Copyright section */
        #copyright {
            background-color: #222;
            color: white;
            padding: 10px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Video Container with Overlay Banner -->
    <div id="video-container">
        <!-- Banner Section -->
        <div id="banner">
            <p>Welcome to TP Football Live! Enjoy the match!</p>
        </div>

        <!-- Video Player Integration -->
        <video id="player" class="player" controls width="80%" playsinline></video>
    </div>

    <!-- Logo Section -->
    <div>
        <img id="logo" src="your-logo-url.png" alt="Football Stream Logo">
    </div>

    <!-- Football Stream Title -->
    <div id="title">TP Football Live</div>

    <div class="outer">
        <div class="inner">
            <div class="main" id="main"></div>
        </div>
    </div>

    <!-- Play Button -->
    <button id="playButton">Play</button>

    <!-- Copyright Section -->
    <div id="copyright">
        &copy; 2024 TP Football Live. All rights reserved.
    </div>

    <script>
        // HLS.js player setup
        var video = document.getElementById('player');
        var videoUrl = "{{ video_url }}";

        // Check if the browser supports HLS.js
        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                // Auto-play when the manifest is parsed
                video.play();
            });
        }
        // Fallback to native browser support for HLS if available (for Safari)
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoUrl;
            video.addEventListener('loadedmetadata', function () {
                // Auto-play when metadata is loaded
                video.play();
            });
        }

        // Play button functionality
        document.getElementById('playButton').addEventListener('click', function() {
            if (video.paused) {
                video.play(); // Play the video
                this.textContent = 'Pause'; // Change button text to 'Pause'
            } else {
                video.pause(); // Pause the video
                this.textContent = 'Play'; // Change button text back to 'Play'
            }
        });
    </script>
</body>
</html>
