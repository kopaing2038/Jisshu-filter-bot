<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <center>
        <div class="outer">
            <div class="inner">
                <div class="main" id="main">
                    <!-- Video Player Integration -->
                    <video id="player" class="player" controls width="80%" playsinline></video>
                </div>
            </div>
        </div>
    </center>

    <script>
        // HLS.js player setup
        var video = document.getElementById('player');
        var videoUrl = "{{ video_url }}";

        // Check if the browser supports HLS.js
        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                video.play();
            });
        }
        // Fallback to native browser support for HLS if available (for Safari)
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoUrl;
            video.addEventListener('loadedmetadata', function () {
                video.play();
            });
        }
    </script>
</body>
</html>
