<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Stream</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            background-color: black;
            color: white; /* Optional: To make text visible on black background */
            text-align: center; /* Center the content */
        }
        #logo {
            max-width: 200px; /* Set logo size */
            margin-top: 20px;
        }
        #title {
            font-size: 36px; /* Font size for the title */
            font-weight: bold;
            margin-top: 20px; /* Space between logo and title */
        }
    </style>
</head>
<body>
    <!-- Logo Section -->
    <div>
        <img id="logo" src="your-logo-url.png" alt="Football Stream Logo">
    </div>

    <!-- Football Stream Title -->
    <div id="title">Football Stream</div>

    <div class="outer">
        <div class="inner">
            <div class="main" id="main">
                <!-- Video Player Integration -->
                <video id="player" class="player" controls width="60%" playsinline></video>
            </div>
        </div>
    </div>

    <script>
        // HLS.js player setup
        var video = document.getElementById('player');
        var videoUrl = "{{ video_url }}";

        // Check if the browser supports HLS.js
        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                video.play();
            });
        }
        // Fallback to native browser support for HLS if available (for Safari)
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoUrl;
            video.addEventListener('loadedmetadata', function () {
                video.play();
            });
        }
    </script>
</body>
</html>
