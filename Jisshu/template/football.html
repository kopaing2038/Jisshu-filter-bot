<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Stream</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        iframe {
            width: 100%;
            height: 80vh;
            border: none;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title">Football Stream</div>
        <iframe src="" id="stream" allowfullscreen></iframe>
        <p id="error-message" style="color: red;"></p>
    </div>

    <script>
        // Fetch the link from the URL path (parameter)
        const urlParams = new URLSearchParams(window.location.search);
        const streamId = urlParams.get('streamId');  // Assuming you pass streamId in the URL

        // Make a fetch request to get the stream URL from the backend
        fetch(`http://localhost:5000/api/football/${streamId}`)
            .then(response => response.json())
            .then(data => {
                const streamUrl = data.link; // Assuming the server returns JSON with a 'link' field
                const iframe = document.getElementById('stream');
                iframe.src = streamUrl;
            })
            .catch(error => {
                document.getElementById('error-message').innerText = "Stream not available.";
            });
    </script>

</body>
</html>
