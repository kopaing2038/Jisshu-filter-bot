<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKS CHANNEL | {{file_name}}</title>
    <link rel="icon" href="https://i.ibb.co/Hh4kF2b/icon.png" type="image/x-icon">
    <link rel="shortcut icon" href="https://i.ibb.co/Hh4kF2b/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://unpkg.com/sheryjs/dist/Shery.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/proavipatil/data@main/fs/src/plyr.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            height: 100%;
            width: 100%;
            background-color: #6d0aaa;
        }

        .file-name {
            margin-top: 10px;
            width: auto;
            height: auto;
            padding: 10px;
            border-radius: 5px;
            background: linear-gradient(to bottom, rgb(253, 252, 253), rgba(22, 22, 22, 0.075));
        }

        .file-name h4 {
            color: var(--mycol); 
        }

        .copyright {
            margin: 30px;
            gap: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #333; 
            padding: 20px; 
            color: #fff;
            border-radius: 10px; 
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #fff;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
    </style>
</head>

<body>

<header>
    <marquee bgcolor="#f7f305">
        <div class="toogle"></div>
        <div id="file-name">
            {{file_name}} {{file_size}}
        </div>
    </marquee>
</header>

<center>
    <div class="outer">
        <div class="inner">
            <div class="main" id="main">
                <!-- Video Player Integration -->
                <video id="player" class="player" src="{video_url}" type="application/x-mpegURL" playsinline controls width="90%"></video>
            </div>
        </div>
    </div>
</center>

<center>
    <a href="https://mkschannel.org"><img src="https://mkschannel.org/ads_file/mks_ads.gif" alt="ads_file" style="width:60%;height:10%;"></a>
</center>

<center>
    <div class="copyright">
        <h5 class="text-center">Copyright © 2024 <a href="https://mkschannel.org"><span style="font-weight: 700;">MKS CHANNEL</span></a>. All Rights Reserved.</h5>
    </div>
</center>

</body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.155.0/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/automat/controlkit.js@master/bin/controlKit.min.js"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/sheryjs/dist/Shery.js"></script>
<script src="https://cdn.plyr.io/3.6.9/plyr.js"></script>
<script src="https://proavipatil.github.io/data/fs/src/script.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const controls = [
            'play-large',
            'rewind',
            'play',
            'fast-forward',
            'progress',
            'current-time',
            'duration',
            'captions',
            'settings',
            'pip',
            'airplay',
            'fullscreen',
            'quality', 
        ];
        const qualityLevels = { 
            default: 1080,
            options: [1080, 720, 480],
            forced: 'none', 
            onChange: null, 
        };

        const player = new Plyr('.player', { 
            controls,
            quality: qualityLevels, 
        });
    });
</script>

</html>
