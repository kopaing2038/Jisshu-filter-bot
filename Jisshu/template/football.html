<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Stream</title>
</head>
<body>
    <h1>Football Stream</h1>
    <video id="football-video" width="100%" controls>
        <!-- Dynamically set the video URL here -->
        <source src="{{ video_url }}" type="application/x-mpegURL">
        Your browser does not support the video tag.
    </video>

    <script>
        // Example of dynamically updating the video source using JavaScript
        const videoUrl = "{{ video_url }}"; // Replace this with the actual video URL dynamically
        const videoElement = document.getElementById("football-video");

        // Update the video source
        videoElement.src = videoUrl;
        videoElement.load(); // Reload the video with the new source
    </script>
</body>
</html>
