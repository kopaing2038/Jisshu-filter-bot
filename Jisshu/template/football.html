<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP Football Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        #logo {
            max-width: 200px;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        #logo:hover {
            transform: scale(1.1); /* Slightly enlarge logo on hover */
        }
        #title {
            font-size: 36px;
            font-weight: bold;
            margin-top: 20px;
        }
        #playButton {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 32px;
            font-size: 20px;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 5px;
        }
        #playButton:hover {
            background-color: #45a049;
        }
        .video-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 30px;
        }
        video {
            max-width: 100%;
            height: auto;
            border: 3px solid #4CAF50;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- Logo Section -->
    <div>
        <img id="logo" src="your-logo-url.png" alt="Football Stream Logo">
    </div>

    <!-- Football Stream Title -->
    <div id="title">TP Football Live</div>

    <!-- Video Player Section -->
    <div class="video-container">
        <video id="player" class="player" controls playsinline></video>
    </div>

    <!-- Play Button -->
    <button id="playButton">Play</button>

    <script>
        // HLS.js player setup
        var video = document.getElementById('player');
        var videoUrl = "{{ video_url }}"; // Replace with your actual video URL

        // Check if the browser supports HLS.js
        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                video.play(); // Auto-play when the manifest is parsed
            });
        }
        // Fallback to native browser support for HLS if available (for Safari)
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoUrl;
            video.addEventListener('loadedmetadata', function () {
                video.play(); // Auto-play when metadata is loaded
            });
        }

        // Play button functionality
        document.getElementById('playButton').addEventListener('click', function() {
            if (video.paused) {
                video.play(); // Play the video
                this.textContent = 'Pause'; // Change button text to 'Pause'
            } else {
                video.pause(); // Pause the video
                this.textContent = 'Play'; // Change button text back to 'Play'
            }
        });
    </script>
</body>
</html>
