<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP Football Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            background-color: black;
            color: white; /* Optional: To make text visible on black background */
            text-align: center; /* Center the content */
        }
        #logo {
            max-width: 200px; /* Set logo size */
            margin-top: 20px;
        }
        #title {
            font-size: 36px; /* Font size for the title */
            font-weight: bold;
            margin-top: 20px; /* Space between logo and title */
        }
        #playButton {
            background-color: #4CAF50; /* Green background */
            color: white; /* White text */
            border: none;
            padding: 15px 32px;
            font-size: 20px;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 5px;
        }
        #playButton:hover {
            background-color: #45a049; /* Darker green on hover */
        }
    </style>
</head>
<body>
    <!-- Logo Section -->
    <div>
        <img id="logo" src="your-logo-url.png" alt="Football Stream Logo">
    </div>

    <!-- Football Stream Title -->
    <div id="title">TP Football Live</div>


    <div class="outer">
        <div class="inner">
            <div class="main" id="main">
                <!-- Video Player Integration -->
                <video id="player" class="player" controls width="80%" playsinline></video>
            </div>
        </div>
    </div>

    <!-- Play Button -->
    <button id="playButton">Play</button>

    <script>
        // HLS.js player setup
        var video = document.getElementById('player');
        var videoUrl = "{{ video_url }}";

        // Check if the browser supports HLS.js
        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                // Auto-play when the manifest is parsed
                video.play();
            });
        }
        // Fallback to native browser support for HLS if available (for Safari)
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoUrl;
            video.addEventListener('loadedmetadata', function () {
                // Auto-play when metadata is loaded
                video.play();
            });
        }

        // Play button functionality
        document.getElementById('playButton').addEventListener('click', function() {
            if (video.paused) {
                video.play(); // Play the video
                this.textContent = 'Pause'; // Change button text to 'Pause'
            } else {
                video.pause(); // Pause the video
                this.textContent = 'Play'; // Change button text back to 'Play'
            }
        });
    </script>
</body>
</html>
