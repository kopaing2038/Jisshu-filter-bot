<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP Football Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        #video-container {
            position: relative;
        }
        #logo {
            max-width: 200px;
            margin-top: 20px;
        }
        #title {
            font-size: 36px;
            font-weight: bold;
            margin-top: 20px;
        }
        #playButton {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 32px;
            font-size: 20px;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 5px;
        }
        #playButton:hover {
            background-color: #45a049;
        }
        /* Scrolling Banner */
        #banner {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            z-index: 2;
            white-space: nowrap;
            overflow: hidden;
            width: 100%;
        }

        #banner p {
            margin: 0;
            padding: 0;
            display: inline-block;
            animation: scroll-banner 15s linear infinite;
        }

        @keyframes scroll-banner {
            0% {
                transform: translateX(100%);
            }
            100% {
                transform: translateX(-100%);
            }
        }

        /* Copyright Section */
        #copyright {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7); /* Slight transparent background */
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

   # <!-- Logo Section -->
    #<div>
        #<img id="logo" src="your-logo-url.png" alt="Football Stream Logo">
    #</div>

    <!-- Football Stream Title -->
    <div id="title">TP Football Live</div>

    <div id="banner">
        <p>Welcome to TP Football Live! Enjoy the match!</p>
    </div>

    <!-- Video Container with Overlay Banner -->
    <div id="video-container">
        <!-- Banner Section -->
        <div id="banner">
            <p>Welcome to TP Football Live!</p>
        </div>

        <!-- Video Player Integration -->
        <video id="player" class="player" controls width="80%" playsinline></video>
    </div>



    <!-- Play Button -->
    <button id="playButton">Play</button>

    <!-- Copyright Notice -->
    <div id="copyright">
        &copy;CopyRight @ 2024 TP Football Live. All Rights Reserved.
    </div>

    <script>
        // HLS.js player setup
        var video = document.getElementById('player');
        var videoUrl = "{{ video_url }}";

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoUrl;
            video.addEventListener('loadedmetadata', function () {
                video.play();
            });
        }

        // Play button functionality
        document.getElementById('playButton').addEventListener('click', function() {
            if (video.paused) {
                video.play();
                this.textContent = 'Pause';
            } else {
                video.pause();
                this.textContent = 'Play';
            }
        });
    </script>
</body>
</html>
